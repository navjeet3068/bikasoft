<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Design to Delivery - Rule of 5 Boxes Icon -->
  
  <!-- Box 1: Design (Top Left) -->
  <rect x="8" y="8" width="32" height="32" rx="4" fill="none" stroke="#00b7ff" stroke-width="2.5" opacity="0.9"/>
  <circle cx="24" cy="24" r="6" fill="none" stroke="#00b7ff" stroke-width="2"/>
  
  <!-- Box 2: Plan (Top Right) -->
  <rect x="60" y="8" width="32" height="32" rx="4" fill="none" stroke="#0076ff" stroke-width="2.5" opacity="0.9"/>
  <line x1="66" y1="20" x2="86" y2="20" stroke="#0076ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="66" y1="28" x2="86" y2="28" stroke="#0076ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="66" y1="36" x2="78" y2="36" stroke="#0076ff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Box 3: Build (Middle Left) -->
  <rect x="8" y="44" width="32" height="32" rx="4" fill="none" stroke="#00b7ff" stroke-width="2.5" opacity="0.9"/>
  <polyline points="14,56 20,50 26,56 32,48" fill="none" stroke="#00b7ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Box 4: Test (Middle Right) -->
  <rect x="60" y="44" width="32" height="32" rx="4" fill="none" stroke="#0076ff" stroke-width="2.5" opacity="0.9"/>
  <polyline points="68,56 74,56 74,62 68,62" fill="none" stroke="#0076ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="78,56 84,56 84,62 78,62" fill="none" stroke="#0076ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="68" y1="68" x2="84" y2="68" stroke="#0076ff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Box 5: Deliver (Center Bottom - Larger) -->
  <rect x="34" y="60" width="32" height="32" rx="4" fill="none" stroke="#00b7ff" stroke-width="2.5" opacity="0.9"/>
  <polygon points="50,68 44,76 56,76" fill="none" stroke="#00b7ff" stroke-width="2" stroke-linejoin="round"/>
  <line x1="50" y1="76" x2="50" y2="88" stroke="#00b7ff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Connection Lines -->
  <line x1="40" y1="24" x2="60" y2="24" stroke="#00b7ff" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.6"/>
  <line x1="24" y1="40" x2="24" y2="44" stroke="#00b7ff" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.6"/>
  <line x1="76" y1="40" x2="76" y2="44" stroke="#00b7ff" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.6"/>
  <line x1="40" y1="76" x2="34" y2="76" stroke="#00b7ff" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.6"/>
  <line x1="60" y1="76" x2="66" y2="76" stroke="#00b7ff" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.6"/>
</svg>
